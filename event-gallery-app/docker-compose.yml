services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eventgallery
      POSTGRES_PASSWORD: eventgallery
      POSTGRES_DB: event_gallery
    ports:
      - "5432:5432"
    volumes:
      - eventgallery_pg:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - eventgallery_minio:/data

volumes:
  eventgallery_pg:
  eventgallery_minio:
