name: Update content & deploy site

on:
  schedule:
    # Every 6 hours, anchored so one run lands at 6:15am Eastern (10:15 UTC)
    # — 15min after local outlets' morning news wave, per site.config.mjs's
    # news.sources. Fixed UTC cron drifts ~1hr during EST months (Nov-Mar),
    # same caveat as newsletter.yml's "7am Toronto time" cron.
    - cron: "15 4,10,16,22 * * *"
  workflow_dispatch:
    inputs:
      force_places:
        description: "Force-refresh Google Places cache (ignores monthly TTL)"
        type: boolean
        default: false
  push:
    branches:
      - main
      - claude/mississauga-insider-site-gllpem
    paths:
      - "site/**"
      - ".github/workflows/update-content.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: content-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Don't re-run when our own data commit lands ([skip ci] guards this too)
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci --no-audit --no-fund

      - name: Run content pipeline (feeds fetched → content parsed)
        working-directory: site
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          EVENTBRITE_API_TOKEN: ${{ secrets.EVENTBRITE_API_TOKEN }}
        run: |
          if [ "${{ inputs.force_places }}" = "true" ]; then
            node scripts/update-content.mjs --force-places
          else
            node scripts/update-content.mjs
          fi

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- site/src/data; then
            echo "No content changes this run."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add site/src/data
            git commit -m "chore(data): automated content update [skip ci]"
            # A manual dispatch fired right after a push (or two schedules
            # overlapping) can race: both runs check out the same base commit,
            # and whichever pushes second gets rejected. Rather than failing
            # the whole run, treat that as "a sibling run already published
            # equally fresh data" and drop this run's now-redundant commit.
            if ! git push; then
              echo "Push rejected — another run already published fresh data for this ref. Discarding this run's redundant commit."
              git fetch origin "${GITHUB_REF_NAME}"
              git reset --hard "origin/${GITHUB_REF_NAME}"
            fi
          fi

      - name: Test Beehiiv API (runs once secrets are configured)
        if: ${{ github.event_name != 'schedule' }}
        working-directory: site
        env:
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
        run: |
          if [ -n "$BEEHIIV_API_KEY" ] && [ -n "$BEEHIIV_PUBLICATION_ID" ]; then
            npm run test:beehiiv
          else
            echo "Beehiiv secrets not set — skipping API test (see site/.env.example)."
          fi

      - name: Build site (GitHub Pages target)
        working-directory: site
        env:
          # Custom domain — served from the root, not a /<repo>/ subpath.
          SITE_URL: https://mississaugainsider.ca
          BASE_PATH: /
        run: npm run build

      # Free live deploy with zero account setup: publishing the gh-pages
      # branch auto-enables GitHub Pages on public repos. When you connect
      # Cloudflare Pages / Netlify / Vercel instead, they redeploy on the
      # data commit above — these two steps can then be removed.
      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/dist
          # Writes/preserves a CNAME file in the published output every
          # deploy — without this, a fresh deploy can silently drop a
          # manually-set custom domain in Settings → Pages.
          cname: mississaugainsider.ca

      - name: Verify live URL
        continue-on-error: true
        run: |
          # Custom domain — build now emits the site at root (BASE_PATH=/),
          # so the old <owner>.github.io/<repo>/ URL no longer matches the
          # built output. This will fail until the DNS records for
          # mississaugainsider.ca are added and have propagated — expected
          # and harmless (continue-on-error) until then.
          URL="https://mississaugainsider.ca/"
          for i in $(seq 1 12); do
            CODE=$(curl -sL -o /dev/null -w "%{http_code}" "$URL")
            echo "attempt $i: HTTP $CODE for $URL"
            [ "$CODE" = "200" ] && { echo "✅ Live at $URL"; exit 0; }
            sleep 20
          done
          echo "::warning::mississaugainsider.ca not reachable yet — add the DNS records (see README), wait for propagation, and enable the custom domain + Enforce HTTPS in Settings → Pages."
