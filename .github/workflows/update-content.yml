name: Update content & deploy site

on:
  schedule:
    # Every 6 hours — fetches feeds, refreshes data, rebuilds & redeploys
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force_places:
        description: "Force-refresh Google Places cache (ignores weekly TTL)"
        type: boolean
        default: false
  push:
    branches:
      - main
      - claude/mississauga-insider-site-gllpem
    paths:
      - "site/**"
      - ".github/workflows/update-content.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: content-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Don't re-run when our own data commit lands ([skip ci] guards this too)
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci --no-audit --no-fund

      - name: Run content pipeline (feeds fetched → content parsed)
        working-directory: site
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          EVENTBRITE_API_TOKEN: ${{ secrets.EVENTBRITE_API_TOKEN }}
        run: |
          if [ "${{ inputs.force_places }}" = "true" ]; then
            node scripts/update-content.mjs --force-places
          else
            node scripts/update-content.mjs
          fi

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- site/src/data; then
            echo "No content changes this run."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add site/src/data
            git commit -m "chore(data): automated content update [skip ci]"
            git push
          fi

      - name: Test Beehiiv API (runs once secrets are configured)
        if: ${{ github.event_name != 'schedule' }}
        working-directory: site
        env:
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
        run: |
          if [ -n "$BEEHIIV_API_KEY" ] && [ -n "$BEEHIIV_PUBLICATION_ID" ]; then
            npm run test:beehiiv
          else
            echo "Beehiiv secrets not set — skipping API test (see site/.env.example)."
          fi

      - name: Build site (GitHub Pages target)
        working-directory: site
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy-github-pages:
    # Free live deploy with zero account setup. When you connect Cloudflare
    # Pages / Netlify / Vercel instead, they redeploy automatically on the
    # data commit above — this job can then be removed.
    needs: update-and-build
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
