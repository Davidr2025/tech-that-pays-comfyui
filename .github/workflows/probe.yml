# TEMPORARY: endpoint discovery for the content pipeline. Delete when done.
name: Probe feed endpoints
on:
  push:
    branches: [claude/mississauga-insider-site-gllpem]
    paths: [site/scripts/probe.mjs]
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node site/scripts/probe.mjs
