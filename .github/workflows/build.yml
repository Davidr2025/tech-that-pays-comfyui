name: Build and push tech-that-pays-comfyui

on:
  # Run automatically on push to main
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'extra_model_paths.yaml'
      - '.github/workflows/build.yml'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: v1)'
        required: false
        default: 'v1'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free disk space (image is ~5-10GB)
        run: |
          # GitHub runners have ~14GB disk by default — clear caches we don't need
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            techthatpays/tech-that-pays-comfyui:${{ github.event.inputs.tag || 'v1' }}
            techthatpays/tech-that-pays-comfyui:latest
          # Use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report
        run: |
          echo "✅ Pushed: techthatpays/tech-that-pays-comfyui:${{ github.event.inputs.tag || 'v1' }}"
          echo "Pull from worker: docker pull techthatpays/tech-that-pays-comfyui:${{ github.event.inputs.tag || 'v1' }}"
